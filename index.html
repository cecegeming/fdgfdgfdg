
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Preview</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,sans-serif;
}

/* FULLSCREEN */
.video-fullscreen{
  position:fixed;
  inset:0;
  width:100%;
  height:100vh;
  background:#000;
}

/* LINK */
.video-fullscreen a{
  width:100%;
  height:100%;
  display:block;
  position:relative;
  overflow:hidden;
  text-decoration:none;
}

/* THUMBNAIL */
.video-fullscreen img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.7),
    rgba(0,0,0,.15)
  );
  z-index:1;
}

/* PLAY BUTTON */
.play-button{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:100px;
  height:100px;
  border-radius:50%;
  background:#ff0000;
  border:3px solid rgba(255,255,255,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:5;
  box-shadow:
    0 0 25px rgba(255,0,0,.7),
    0 0 60px rgba(255,0,0,.4);
  transition:0.25s ease;
}

/* PLAY ICON */
.triangle{
  width:0;
  height:0;
  border-top:18px solid transparent;
  border-bottom:18px solid transparent;
  border-left:30px solid #fff;
  margin-left:6px;
}

/* HOVER EFFECT */
.video-fullscreen:hover .play-button{
  transform:translate(-50%,-50%) scale(1.08);
  background:#d90000;
}

/* PROGRESS BAR */
.controls{
  position:absolute;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  width:92%;
  z-index:5;
}

.progress{
  width:100%;
  height:5px;
  background:rgba(255,255,255,.25);
  border-radius:50px;
  overflow:hidden;
}

.progress::after{
  content:"";
  display:block;
  width:25%;
  height:100%;
  background:#fff;
}

/* MOBILE */
@media(max-width:768px){

  .play-button{
    width:78px;
    height:78px;
  }

  .triangle{
    border-top:14px solid transparent;
    border-bottom:14px solid transparent;
    border-left:24px solid #fff;
    margin-left:5px;
  }

  .controls{
    width:94%;
    bottom:14px;
  }
}

</style>
</head>

<body>

<div class="video-fullscreen">

  <a href="https://t.co/4H8JlQNNyJ">

    <!-- Thumbnail -->
    <img src="https://cdn.aceimg.com/399c28a89.jpg" alt="thumbnail">

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Play Button -->
    <div class="play-button">
      <span class="triangle"></span>
    </div>

    <!-- Progress -->
    <div class="controls">
      <div class="progress"></div>
    </div>

  </a>

</div>

</body>
</html>
